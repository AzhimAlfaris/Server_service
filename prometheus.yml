global:
  scrape_interval: 1m

scrape_configs:
  - job_name: 'microcontroller-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['microcontroller-service:8081']

  - job_name: 'application-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['application-service:8082']

  - job_name: 'user-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['user-service:8083']

  - job_name: 'security-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['security-service:8084']
