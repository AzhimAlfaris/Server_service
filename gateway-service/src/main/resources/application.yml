server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: security-service-auth-route
              uri: http://security-service:8084
              predicates:
                - Path=/auth/**
            - id: security-service-api-auth-route
              uri: http://security-service:8084
              predicates:
                - Path=/api/auth/**
              filters:
                - StripPrefix=1
            - id: user-service-route
              uri: lb://user-service
              predicates:
                - Path=/api/users/**
            - id: application-service-route
              uri: lb://application-service
              predicates:
                - Path=/api/sensor-data/**
            - id: microcontroller-service-readings-route
              uri: lb://microcontroller-service
              predicates:
                - Path=/api/sensor-readings/**
            - id: microcontroller-service-device-settings-route
              uri: lb://microcontroller-service
              predicates:
                - Path=/api/device-settings/**

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: ${spring.application.name}
