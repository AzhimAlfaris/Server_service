services:
  verdant-mysql:
    image: mysql:8.0
    container_name: verdant-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: microcontroller-service-db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init/microcontroller-service-db.sql:/docker-entrypoint-initdb.d/01-microcontroller-service-db.sql:ro
      - ./init/user_service_db.sql:/docker-entrypoint-initdb.d/01-user-service-db.sql:ro
    networks:
      - verdant-network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  rabbitmq:
    image: rabbitmq:management
    container_name: verdant-rabbitmq
    restart: unless-stopped
    command: sh /usr/local/bin/rabbitmq-start.sh
    environment:
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: password
    ports:
      - "5672:5672"
      - "1883:1883"
      - "15672:15672"
    volumes:
      - ./init/rabbitmq-start.sh:/usr/local/bin/rabbitmq-start.sh:ro
    networks:
      - verdant-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  microcontroller-service:
    build:
      context: ./microcontroller-service
    container_name: microcontroller-service
    restart: unless-stopped
    depends_on:
      verdant-mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      logstash:
        condition: service_started
    environment:
      DB_HOST: verdant-mysql
      DB_PORT: 3306
      DB_NAME_MICRO: microcontroller-service-db
      DB_USERNAME: root
      DB_PASSWORD: root
      USERSERVICE_BASE_URL: http://user-service:8083
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: user
      RABBITMQ_PASSWORD: password
      LOGSTASH_HOST: verdant-logstash
      JAVA_OPTS: -Xms128m -Xmx256m -XX:+UseSerialGC
    ports:
      - "8081:8081"
    networks:
      - verdant-network
    deploy:
      resources:
        limits:
          memory: 350M

  application-service:
    build:
      context: ./application-service
    container_name: application-service
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
      microcontroller-service:
        condition: service_started
      logstash:
        condition: service_started
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: user
      RABBITMQ_PASSWORD: password
      USERSERVICE_BASE_URL: http://user-service:8083
      MAIL_HOST: smtp.gmail.com
      MAIL_PORT: 587
      MAIL_USERNAME: anasrudi048@gmail.com
      MAIL_PASSWORD: zcqd rasi elnk jcjx
      MAIL_FROM: anasrudi048@gmail.com
      LOGSTASH_HOST: verdant-logstash
      JAVA_OPTS: -Xms128m -Xmx256m -XX:+UseSerialGC
    ports:
      - "8082:8082"
    networks:
      - verdant-network
    deploy:
      resources:
        limits:
          memory: 350M

  user-service:
    build:
      context: ./user-service
    container_name: user-service
    restart: unless-stopped
    depends_on:
      verdant-mysql:
        condition: service_healthy
      logstash:
        condition: service_started
    environment:
      DB_HOST: verdant-mysql
      DB_PORT: 3306
      DB_NAME_USER: user_service_db
      DB_USERNAME: root
      DB_PASSWORD: root
      LOGSTASH_HOST: verdant-logstash
      JAVA_OPTS: -Xms128m -Xmx256m -XX:+UseSerialGC
    ports:
      - "8083:8083"
    networks:
      - verdant-network
    deploy:
      resources:
        limits:
          memory: 350M

  security-service:
    build:
      context: ./security-service
    container_name: security-service
    restart: unless-stopped
    depends_on:
      user-service:
        condition: service_started
      logstash:
        condition: service_started
    environment:
      USERSERVICE_BASE_URL: http://user-service:8083
      JWT_SECRET: Jcau6mPiMUpCK3NflMzbvcgr0oVkILNhg7sb29Kh0yP
      JWT_EXPIRATION: 86400000
      LOGSTASH_HOST: verdant-logstash
      JAVA_OPTS: -Xms128m -Xmx256m -XX:+UseSerialGC
    ports:
      - "8084:8084"
    networks:
      - verdant-network
    deploy:
      resources:
        limits:
          memory: 350M

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - verdant-network # Sesuaikan dengan nama network docker Anda

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-storage:/var/lib/grafana
    networks:
      - verdant-network
    depends_on:
      - prometheus

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.10
    container_name: verdant-elasticsearch
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    networks:
      - verdant-network
    deploy:
      resources:
        limits:
          memory: 768M

  logstash:
    image: docker.elastic.co/logstash/logstash:7.17.10
    container_name: verdant-logstash
    environment:
      - "LS_JAVA_OPTS=-Xms256m -Xmx256m"
    volumes:
      - ./elk-stack/logstash/pipeline:/usr/share/logstash/pipeline
    ports:
      - "5000:5000"
      - "5001:5001"
      - "5002:5002"
      - "5003:5003"
    networks:
      - verdant-network
    depends_on:
      - elasticsearch
    deploy:
      resources:
        limits:
          memory: 512M

  kibana:
    image: docker.elastic.co/kibana/kibana:7.17.10
    container_name: verdant-kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://verdant-elasticsearch:9200
    networks:
      - verdant-network
    depends_on:
      - elasticsearch

volumes:
  mysql_data:
  grafana-storage:
  
networks:
  verdant-network:
    driver: bridge
