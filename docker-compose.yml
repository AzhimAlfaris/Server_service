services:
  verdant-userDb:
    image: mysql:8.0
    container_name: verdant-userDb
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: user_service_db
    ports:
      - "3307:3306" # Di-map ke port 3307 di host agar tidak bentrok jika diakses lokal
    volumes:
      - verdant-user-db-data:/var/lib/mysql
      - ./init/user_service_db.sql:/docker-entrypoint-initdb.d/user_service_db.sql
    networks:
      - verdant-network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Container 2: Database khusus untuk Microcontroller Service
  verdant-microcontrollerDb:
    image: mysql:8.0
    container_name: verdant-microcontrollerDb
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: microcontroller-service-db
    ports:
      - "3308:3306" # Di-map ke port 3308 di host
    volumes:
      - verdant-micro-db-data:/var/lib/mysql
      - ./init/microcontroller-service-db.sql:/docker-entrypoint-initdb.d/microcontroller-service-db.sql
    networks:
      - verdant-network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:management
    container_name: verdant-rabbitmq
    restart: unless-stopped
    command: sh /usr/local/bin/rabbitmq-start.sh
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "5672:5672"
      - "1883:1883"
      - "15672:15672"
    volumes:
      - ./init/rabbitmq-start.sh:/usr/local/bin/rabbitmq-start.sh:ro
    networks:
      - verdant-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  eureka-server:
    build:
      context: ./eureka-server
    container_name: eureka-server
    restart: unless-stopped
    ports:
      - "8761:8761"
    expose:
      - "8761"
    networks:
      - verdant-network
    depends_on:
      - logstash
    environment:
      LOGSTASH_HOST: verdant-logstash
      TZ: Asia/Jakarta
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8761/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  microcontroller-service:
    build:
      context: ./microcontroller-service
    container_name: microcontroller-service
    restart: unless-stopped
    depends_on:
      eureka-server:
        condition: service_healthy
      verdant-microcontrollerDb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      logstash:
        condition: service_started
    environment:
      DB_HOST: verdant-microcontrollerDb
      DB_PORT: 3306
      DB_NAME_MICRO: microcontroller-service-db
      DB_USERNAME: ${MICRO_DB_USERNAME}
      DB_PASSWORD: ${MICRO_DB_PASSWORD}
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8761/eureka/
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS}
      LOGSTASH_HOST: verdant-logstash
      JAVA_OPTS: -Xms128m -Xmx256m -XX:+UseSerialGC
      TZ: Asia/Jakarta
    ports:
      - "8081:8081"
    networks:
      - verdant-network
    deploy:
      resources:
        limits:
          memory: 350M

  application-service:
    build:
      context: ./application-service
    container_name: application-service
    restart: unless-stopped
    depends_on:
      eureka-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      microcontroller-service:
        condition: service_started
      logstash:
        condition: service_started
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS}
      JWT_SECRET: ${JWT_SECRET}
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8761/eureka/
      MAIL_HOST: smtp.gmail.com
      MAIL_PORT: 587
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_FROM: ${MAIL_USERNAME}
      LOGSTASH_HOST: verdant-logstash
      JAVA_OPTS: -Xms128m -Xmx256m -XX:+UseSerialGC
      TZ: Asia/Jakarta
    ports:
      - "8082:8082"
    networks:
      - verdant-network
    deploy:
      resources:
        limits:
          memory: 350M

  user-service:
    build:
      context: ./user-service
    container_name: user-service
    restart: unless-stopped
    depends_on:
      eureka-server:
        condition: service_healthy
      verdant-userDb:
        condition: service_healthy
      logstash:
        condition: service_started
    environment:
      DB_HOST: verdant-userDb
      DB_PORT: 3306
      DB_NAME_USER: user_service_db
      DB_USERNAME: ${USER_DB_USERNAME}
      DB_PASSWORD: ${USER_DB_PASSWORD}
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8761/eureka/
      LOGSTASH_HOST: verdant-logstash
      JAVA_OPTS: -Xms128m -Xmx256m -XX:+UseSerialGC
      TZ: Asia/Jakarta
    ports:
      - "8083:8083"
    networks:
      - verdant-network
    deploy:
      resources:
        limits:
          memory: 350M

  security-service:
    build:
      context: ./security-service
    container_name: security-service
    restart: unless-stopped
    depends_on:
      eureka-server:
        condition: service_healthy
      user-service:
        condition: service_started
      logstash:
        condition: service_started
    environment:
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8761/eureka/
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      LOGSTASH_HOST: verdant-logstash
      JAVA_OPTS: -Xms128m -Xmx256m -XX:+UseSerialGC
      TZ: Asia/Jakarta
    ports:
      - "8084:8084"
    networks:
      - verdant-network
    deploy:
      resources:
        limits:
          memory: 350M

  gateway-service:
    build:
      context: ./gateway-service
    container_name: gateway-service
    restart: unless-stopped
    depends_on:
      eureka-server:
        condition: service_healthy
    environment:
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8761/eureka/
      JAVA_OPTS: -Xms128m -Xmx256m -XX:+UseSerialGC
      LOGSTASH_HOST: verdant-logstash
      TZ: Asia/Jakarta
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    ports:
      - "8080:8080"
    networks:
      - verdant-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 350M

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - verdant-network # Sesuaikan dengan nama network docker Anda

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-storage:/var/lib/grafana
    networks:
      - verdant-network
    depends_on:
      - prometheus

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.10
    container_name: verdant-elasticsearch
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    networks:
      - verdant-network
    deploy:
      resources:
        limits:
          memory: 768M

  logstash:
    image: docker.elastic.co/logstash/logstash:7.17.10
    container_name: verdant-logstash
    environment:
      - "LS_JAVA_OPTS=-Xms256m -Xmx256m"
    volumes:
      - ./elk-stack/logstash/pipeline:/usr/share/logstash/pipeline
    ports:
      - "5000:5000"
      - "5001:5001"
      - "5002:5002"
      - "5003:5003"
      - "5004:5004"
      - "5005:5005" 
    networks:
      - verdant-network
    depends_on:
      - elasticsearch
    deploy:
      resources:
        limits:
          memory: 512M

  kibana:
    image: docker.elastic.co/kibana/kibana:7.17.10
    container_name: verdant-kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://verdant-elasticsearch:9200
    networks:
      - verdant-network
    depends_on:
      - elasticsearch

volumes:
  mysql_data:
  grafana-storage:
  verdant-user-db-data:
  verdant-micro-db-data:
  
networks:
  verdant-network:
    driver: bridge
